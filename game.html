<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>逆熵 — CEO 決策模擬</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#141b2d;--panel:#0d1220;--border:#1e2a42;--text:#e2e8f0;--dim:#64748b;
--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--purple:#a855f7;--blue:#3b82f6;--accent:#06b6d4;
--sidebar:290px;--radius:10px}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
/* Scrollbar */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2a42;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#2d3a52}
/* Selection */
::selection{background:rgba(6,182,212,.3);color:#fff}

#app{display:flex;height:100vh}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;scroll-behavior:smooth}
#main-inner{max-width:700px;width:100%;margin:0 auto;padding:28px 32px;flex:1}

/* Season progress bar */
.progress-wrap{padding:0 18px 10px;border-bottom:1px solid var(--border)}
.progress-bar{height:3px;background:#1e293b;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .6s ease}

.sb-header{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.sb-logo{font-size:14px;font-weight:800;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-season{display:inline-block;margin-top:6px;font-size:11px;padding:4px 12px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-weight:600}
.sb-section{padding:14px 18px;border-bottom:1px solid var(--border)}
.sb-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;font-weight:700}
.lifeline{margin-bottom:16px}
.ll-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.ll-name{font-size:11px;color:var(--dim);font-weight:500}
.ll-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
.ll-bar{height:8px;border-radius:4px;background:#1e293b;overflow:hidden}
.ll-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1),background .5s}
.ll-zone{font-size:10px;margin-top:3px}
.cash-block{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;border:1px solid var(--border)}
.cash-main{font-size:22px;font-weight:800;color:var(--accent)}
.cash-sub{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.5}
.sb-fs{font-size:11px;color:var(--purple);padding:3px 0;display:flex;align-items:center;gap:5px}
.fs-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.sb-proj{font-size:11px;padding:7px 9px;background:var(--card);border-radius:6px;margin-bottom:5px;border-left:3px solid var(--accent)}
.sb-proj .pn{font-weight:600}.sb-proj .pd{font-size:10px;color:var(--dim);margin-top:1px}
.sb-market{font-size:11px;padding:6px 8px;background:var(--card);border-radius:6px;margin-bottom:5px;border-left:3px solid var(--orange)}
.sb-market .mk-name{font-weight:600;font-size:11px}.sb-market .mk-detail{font-size:10px;color:var(--dim);margin-top:1px}

.phase-title{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:16px;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:6px}
.phase-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;animation:fadeUp .35s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-title{font-size:17px;font-weight:700;margin-bottom:8px}
.card-desc{font-size:13px;color:var(--dim);line-height:1.75;margin-bottom:16px;border-left:3px solid var(--border);padding-left:14px}
.card-tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:10px;margin-bottom:8px;font-weight:600}
.tag-entropy{background:#7f1d1d;color:#fca5a5}.tag-decision{background:#1e3a5f;color:#93c5fd}
.tag-ops{background:#14532d;color:#86efac}.tag-ai{background:#4a1d96;color:#c4b5fd}.tag-hidden{background:#78350f;color:#fcd34d}
.tag-deal-sm{background:#14532d;color:#86efac}.tag-deal-bg{background:#7c2d12;color:#fed7aa}.tag-expense{background:#7f1d1d;color:#fca5a5}
.tag-timing{background:#1e3a5f;color:#7dd3fc}.tag-negotiate{background:#312e81;color:#a5b4fc}

/* Card type visual bands */
.card-band{height:4px;border-radius:var(--radius) var(--radius) 0 0;margin:-20px -20px 14px;width:calc(100% + 40px)}
.band-decision{background:linear-gradient(90deg,#06b6d4,#3b82f6)}.band-entropy{background:linear-gradient(90deg,#ef4444,#f97316)}
.band-ops{background:linear-gradient(90deg,#22c55e,#06b6d4)}.band-opp{background:linear-gradient(90deg,#eab308,#f97316)}
.band-ai{background:linear-gradient(90deg,#a855f7,#6366f1)}.band-hidden{background:linear-gradient(90deg,#f97316,#ef4444)}
.band-cascade{background:linear-gradient(90deg,#06b6d4,#a855f7)}.band-timing{background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
.band-negotiate{background:linear-gradient(90deg,#6366f1,#ec4899)}

/* Option cost indicators */
.opt-cost-neg{border-left:3px solid var(--red)}.opt-cost-pos{border-left:3px solid var(--green)}
.opt-risk{border-left:3px solid var(--purple)}
.opt-fs-badge{position:absolute;top:8px;right:10px;font-size:9px;color:var(--purple);background:#1a0533;padding:2px 6px;border-radius:4px}

/* CEO diary */
.ceo-diary{font-size:12px;color:var(--dim);font-style:italic;padding:10px 14px;background:linear-gradient(135deg,#0c1020,#141b2d);border-radius:var(--radius);margin-top:10px;border-left:2px solid var(--purple);animation:diaryIn .6s ease}
@keyframes diaryIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* Season transition */
.phase-transition{animation:phaseIn .4s ease}
@keyframes phaseIn{from{opacity:0}to{opacity:1}}

.option-btn{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:8px;border-radius:var(--radius);
border:1px solid var(--border);background:linear-gradient(135deg,#0f172a,#131d32);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);line-height:1.5;position:relative;overflow:hidden}
.option-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,182,212,.05),transparent);opacity:0;transition:opacity .2s}
.option-btn:hover{border-color:var(--accent);transform:translateX(4px)}.option-btn:hover::before{opacity:1}
.option-btn:active{transform:translateX(4px) scale(.99)}
.option-btn.locked{opacity:.25;cursor:not-allowed;pointer-events:none;transform:none}
.opt-label{display:inline-block;font-weight:800;color:#000;background:var(--accent);padding:1px 8px;border-radius:4px;margin-right:8px;font-size:11px}
.opt-effect{font-size:11px;color:var(--dim);margin-top:4px;display:block}

.invest-grid{display:grid;gap:8px}
.invest-btn{padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:#0f172a;color:var(--text);cursor:pointer;text-align:left;font-size:12px;transition:all .2s;line-height:1.4}
.invest-btn:hover{border-color:var(--green);background:#071a12}.invest-btn.selected{border-color:var(--green);background:#052e16;box-shadow:0 0 12px rgba(34,197,94,.2)}
.invest-btn.locked{opacity:.25;cursor:not-allowed;pointer-events:none}
.invest-btn .inv-name{font-weight:700}.invest-btn .inv-cost{color:var(--accent);font-weight:700;float:right;font-size:13px}
.invest-btn .inv-fx{font-size:10px;color:var(--dim);margin-top:3px}
.proj-btn{border-left:3px solid var(--purple)}.proj-btn:hover{border-color:var(--purple);background:#120a26}
.proj-btn.selected{border-color:var(--purple);background:#1a0533;box-shadow:0 0 12px rgba(168,85,247,.2)}
.proj-label{font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-weight:700}

.btn-primary{display:block;width:100%;padding:14px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--accent),#0891b2);color:#000;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;transition:all .2s;box-shadow:0 2px 12px rgba(6,182,212,.25)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(6,182,212,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{display:block;width:100%;padding:11px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;margin-top:8px;transition:all .15s}
.btn-secondary:hover{border-color:var(--dim);background:rgba(255,255,255,.03)}

.settle-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center}
.settle-row:last-child{border:none}.delta-pos{color:var(--green);font-weight:600}.delta-neg{color:var(--red);font-weight:600}

#game-over{text-align:center;padding:50px 24px}
#game-over h1{font-size:26px;margin-bottom:6px;line-height:1.3}
.go-score{font-size:72px;font-weight:800;color:var(--accent);margin:24px 0 8px;text-shadow:0 0 40px rgba(6,182,212,.3)}
.go-grade{font-size:28px;font-weight:700}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0;text-align:left}
.stat-box{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.stat-box .label{font-size:10px;color:var(--dim)}.stat-box .val{font-size:20px;font-weight:700;margin-top:3px}

/* Legacy */
.trait-btn{padding:12px;border-radius:8px;border:1px solid var(--border);background:#0f172a;color:var(--text);cursor:pointer;text-align:left;margin-bottom:8px;transition:all .15s}
.trait-btn:hover{border-color:var(--purple)}.trait-btn.selected{border-color:var(--purple);background:#1a0533}
.trait-name{font-weight:700;color:var(--purple);font-size:13px}.trait-fx{font-size:11px;color:var(--dim);margin-top:3px}

#start-screen{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;background:radial-gradient(ellipse at 50% 30%,#0c1a2e 0%,var(--bg) 70%)}
#start-screen h1{font-size:36px;letter-spacing:3px;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#start-screen p{color:var(--dim);margin:12px 0 28px;line-height:1.8;max-width:440px;font-size:14px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:420px;margin:0 auto}
.mode-btn{padding:20px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;text-align:left;transition:all .2s}
.mode-btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(6,182,212,.15)}
.mode-btn h3{font-size:15px;margin-bottom:6px}.mode-btn p{font-size:11px;color:var(--dim);margin:0;line-height:1.5}

@media(max-width:768px){
#sidebar{position:fixed;left:-100%;width:85%;max-width:320px;z-index:20;transition:left .3s cubic-bezier(.4,0,.2,1)}
#sidebar.open{left:0}
.mob-toggle{display:block!important}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:15;backdrop-filter:blur(2px)}
.mob-overlay.show{display:block}
#main-inner{padding:20px 16px}
.option-btn{padding:16px;min-height:48px}
.invest-btn{padding:14px;min-height:48px}
.btn-primary{padding:16px;font-size:15px}
.mode-grid{grid-template-columns:1fr}
}
/* Industry selection */
.industry-btn{transition:all .2s !important}.industry-btn.selected{border-color:var(--accent) !important;background:linear-gradient(135deg,#0c1a2e,#162040) !important;box-shadow:0 0 12px rgba(6,182,212,.25) !important}
.industry-btn h3{font-size:14px}.industry-btn p{font-size:10px}
.npc-name{color:var(--accent);font-weight:700}

.mob-toggle{display:none;position:fixed;top:10px;left:10px;z-index:11;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:var(--radius);font-size:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* Dashboard modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer}

/* Growth Mode indicator */
.growth-badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:10px;background:linear-gradient(135deg,#052e16,#064e3b);color:#22c55e;border:1px solid #166534;font-weight:700;letter-spacing:1px;animation:growthPulse 3s infinite}
@keyframes growthPulse{0%,100%{box-shadow:0 0 6px rgba(34,197,94,.2)}50%{box-shadow:0 0 16px rgba(34,197,94,.4)}}
.growth-transition{animation:growthUnlock 1s ease;text-align:center;padding:20px;margin:14px 0;border-radius:var(--radius);background:linear-gradient(135deg,#052e16,#0a2e1a);border:2px solid #166534}
@keyframes growthUnlock{0%{opacity:0;transform:scale(.8)}50%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}

/* Threshold warnings */
.threshold-warn{font-size:9px;padding:3px 8px;border-radius:4px;margin-top:4px;animation:warnBlink 2s infinite}
.threshold-near-growth{background:#052e16;color:#22c55e;border:1px solid #166534}
.threshold-near-spiral{background:#450a0a;color:#fca5a5;border:1px solid #991b1b}
@keyframes warnBlink{0%,100%{opacity:.7}50%{opacity:1}}

/* Settlement stagger animation */
.settle-stagger{opacity:0;animation:staggerIn .3s ease forwards}
@keyframes staggerIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* Storm season indicator */
.storm-badge{font-size:9px;padding:2px 8px;border-radius:8px;background:#7f1d1d;color:#fca5a5;margin-left:6px}
.calm-badge{font-size:9px;padding:2px 8px;border-radius:8px;background:#052e16;color:#86efac;margin-left:6px}
.chart-wrap{background:var(--card);border-radius:8px;padding:16px;margin-bottom:16px}
.chart-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.detail-box{background:var(--card);border-radius:8px;padding:10px}
.detail-box .dl{font-size:10px;color:var(--dim)}.detail-box .dv{font-size:16px;font-weight:700;margin-top:2px}

/* Settlement mood */
.settle-mood{padding:12px 16px;border-radius:var(--radius);margin-bottom:14px;font-size:14px;font-weight:600;text-align:center;animation:moodIn .5s ease}
@keyframes moodIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.mood-great{background:linear-gradient(135deg,#052e16,#064e3b);color:var(--green);border:1px solid #166534;box-shadow:0 0 20px rgba(34,197,94,.15)}
.mood-good{background:linear-gradient(135deg,#172554,#1e3a5f);color:var(--blue);border:1px solid #1e40af}
.mood-warn{background:linear-gradient(135deg,#451a03,#5c2a0a);color:var(--orange);border:1px solid #92400e}
.mood-danger{background:linear-gradient(135deg,#450a0a,#5c1010);color:var(--red);border:1px solid #991b1b;animation:moodIn .5s ease,dangerPulse 2s infinite}
@keyframes dangerPulse{0%,100%{box-shadow:0 0 10px rgba(239,68,68,.2)}50%{box-shadow:0 0 25px rgba(239,68,68,.4)}}

/* Opportunity tag */
.tag-opp{background:#164e63;color:#67e8f9}

/* Net worth button in sidebar */
.nw-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 12px;background:linear-gradient(135deg,#0c1a2e,#162040);border:1px solid var(--accent);border-radius:8px;color:var(--text);cursor:pointer;font-size:12px;transition:all .2s;box-shadow:0 0 8px rgba(6,182,212,.15)}
.nw-btn:hover{border-color:#22d3ee;box-shadow:0 0 14px rgba(6,182,212,.3);transform:translateY(-1px)}
.nw-btn .nw-label{font-size:10px;color:var(--dim)}
.nw-btn .nw-val{font-size:18px;font-weight:800;color:var(--accent)}
.nw-btn .nw-arrow{font-size:12px;color:var(--dim)}

/* Review system */
.review-section{margin-top:20px;text-align:left}
.review-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--accent)}
.timeline-item{padding:10px 12px;border-left:3px solid var(--border);margin-bottom:8px;font-size:12px;background:var(--card);border-radius:0 8px 8px 0}
.timeline-item.positive{border-left-color:var(--green)}
.timeline-item.negative{border-left-color:var(--red)}
.timeline-item.neutral{border-left-color:var(--yellow)}
.tl-season{font-size:10px;color:var(--dim)}
.tl-title{font-weight:700;margin:2px 0}
.tl-choice{color:var(--accent);font-size:11px}
.tl-result{font-size:11px;color:var(--dim);margin-top:3px}
.tl-alt{font-size:10px;color:var(--purple);margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.knowledge-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px}
.knowledge-box .kb-title{font-weight:700;color:var(--accent);margin-bottom:4px}
.knowledge-box .kb-lesson{color:var(--dim);line-height:1.5}
.review-chart{background:var(--card);border-radius:8px;padding:16px;margin-bottom:16px}
</style>
</head>
<body>

<div id="start-screen">
<div>
<h1>逆熵</h1>
<p>五年。20 個決策。每一個都有代價。</p>
<div style="margin-bottom:16px"><input id="company-name" type="text" placeholder="為你的公司取個名字" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-size:14px;width:220px;text-align:center;outline:none" maxlength="12"></div>
<div style="margin-bottom:16px">
<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">選擇你的產業</div>
<div class="mode-grid" id="industry-grid">
<button class="mode-btn industry-btn selected" data-ind="tech" onclick="pickIndustry(this,'tech')"><h3>🖥️ 科技業</h3><p>團隊強、客戶少<br>高心跳 · 低根系</p></button>
<button class="mode-btn industry-btn" data-ind="food" onclick="pickIndustry(this,'food')"><h3>🍜 餐飲業</h3><p>客戶多、現金少<br>高根系 · 低心跳</p></button>
<button class="mode-btn industry-btn" data-ind="mfg" onclick="pickIndustry(this,'mfg')"><h3>🏭 製造業</h3><p>資金厚、支出高<br>均衡但壓力大</p></button>
<button class="mode-btn industry-btn" data-ind="med" onclick="pickIndustry(this,'med')"><h3>🏥 醫療業</h3><p>穩定但法規多<br>衰減慢 · 事件多</p></button>
</div>
</div>
<div id="legacy-display"></div>
<div class="mode-grid">
<button class="mode-btn" onclick="startGame('normal')"><h3>🏢 經典模式</h3><p>5 年 · 1 個對手<br>「先活下來」</p></button>
<button class="mode-btn" onclick="startGame('challenge')"><h3>🔥 地獄模式</h3><p>6 年 · 2 個對手<br>「活下來只是開始」</p></button>
</div>
</div>
</div>

<div id="app" class="hidden">
<button class="mob-toggle" onclick="toggleSidebar()">☰</button>
<div class="mob-overlay" id="mob-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
<div class="sb-header"><div class="sb-logo" id="sb-logo">逆熵</div><div class="sb-season" id="sb-season">Y1Q1</div></div>
<div class="progress-wrap"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dim)"><span>Y1</span><span id="sb-progress-pct">0%</span><span>Y5</span></div><div class="progress-bar"><div class="progress-fill" id="sb-progress" style="width:0%"></div></div></div>
<div class="sb-section">
<div class="sb-title">財務</div>
<div class="cash-block"><div class="cash-main" id="sb-cash">$392 萬</div>

  {l:'B',t:'堅持底線：15% 無董事席',fx:{hb:3},fs:{n:'談判結果',d:1,fx:{cash:150},rnd:{fail:{},ch:40}},diary:'「堅持底線的代價可能是空手而歸。但這是我的公司。」'},
  {l:'C',t:'可轉債方案（不稀釋股權）',fx:{cash:150},fs:{n:'轉債到期',d:6,fx:{cash:-180}},diary:'「可轉債讓我保住控制權。但利息是時間的代價。」'}]},
// ── Growth Mode cards (成長模式解鎖) ──
{id:27,title:'上市還是不上市？',year:[3,5],desc:'投資銀行看到你的被動收入結構，主動提出上市輔導。但上市意味著更多透明度和更高的合規成本。',tag:'negotiate',growthOnly:true,
opts:[{l:'A',t:'啟動上市籌備',fx:{cash:300,hb:-8},fs:{n:'上市壓力',d:3,fx:{hb:-6,cash:80}},diary:'「敲鐘那一天，我想起的是所有沒睡的夜晚。」'},
  {l:'B',t:'保持私有，繼續累積',fx:{hb:5,roots:3},diary:'「不上市不代表不成功。自由的代價是——你買得起。」'},
  {l:'C',t:'引入策略投資人（非公開）',fx:{cash:150,roots:-3},diary:'「拿聰明錢，不拿急錢。」'}]},
{id:28,title:'併購同業',year:[3,5],desc:'一家同業經營不善，開價 $200 萬出售。你的被動收入足以支撐整合期的現金消耗。',tag:'negotiate',growthOnly:true,
opts:[{l:'A',t:'全額收購',fx:{cash:-200,roots:12,hb:-5},fs:{n:'整合陣痛',d:3,fx:{hb:6,roots:5}},gate:{artery:50},diary:'「買公司容易，融合文化是真正的挑戰。」'},
  {l:'B',t:'觀望不買',fx:{roots:2},diary:'「不是每個機會都值得抓。有時候最好的交易是你沒做的那筆。」'}]},
{id:29,title:'國際擴張',year:[4,5],desc:'被動收入穩定後，你有餘裕考慮東南亞市場。當地合作夥伴已經找好了。',tag:'timing',growthOnly:true,
opts:[{l:'A',t:'設立海外子公司',fx:{cash:-180,roots:-5,hb:3},fs:{n:'海外據點',d:4,fx:{roots:15,cash:50}},gate:{artery:55},diary:'「第一次在護照上蓋的章是商務簽。從此，公司不只屬於這座島。」'},
  {l:'B',t:'授權代理模式',fx:{cash:-50,roots:3},fs:{n:'代理回報',d:3,fx:{cash:30}},diary:'「讓別人用你的品牌賺錢，你抽成。風險小，但控制力也小。」'}]},
{id:30,title:'打造第二曲線',year:[3,5],desc:'核心事業穩定了，團隊提出了一個全新的產品線概念。需要 $150 萬和半年時間。',growthOnly:true,
opts:[{l:'A',t:'全力投入第二曲線',fx:{cash:-150,hb:5,roots:-4},fs:{n:'第二曲線',d:5,fx:{cash:80,roots:8},rnd:{fail:{cash:-80,hb:-5},ch:35}},diary:'「第一條曲線讓你活著。第二條曲線讓你自由。」'},
  {l:'B',t:'專注核心，深化護城河',fx:{hb:3,roots:5},diary:'「在一件事上做到極致，比做十件事做到普通好。」'},
  {l:'C',t:'小規模試水（$50萬）',fx:{cash:-50,hb:2},fs:{n:'試水結果',d:3,fx:{cash:20},rnd:{fail:{cash:-20},ch:40}},diary:'「用最小的籌碼驗證最大的假設。」'}]},
// ── Y3 中盤危機（全產業共用，固定觸發）──
{id:50,title:'全球黑天鵝',year:[3,3],desc:`${npc('wang')}緊急來電：「全球供應鏈崩潰加上金融市場暴跌，你的三個大客戶同時要求延遲付款。沒有人能置身事外。」`,tag:'hidden',crisis:true,npcId:'wang',
opts:[{l:'A',t:'大幅裁員保現金（砍 25%）',fx:{hb:-18,roots:-5,cash:80},fs:{n:'裁員重建',d:4,fx:{hb:6,roots:-3}},insight:'景氣循環中，現金為王。但砍人砍掉的不只是成本，是組織的記憶和能力。',diary:'「簽了 12 份離職通知。每一份都是一個人的生計。」'},
  {l:'B',t:'逆勢投資搶市場',fx:{cash:-200,hb:5,roots:8},fs:{n:'逆勢回報',d:4,fx:{roots:12,hb:5},rnd:{fail:{cash:-80,roots:-5},ch:35}},gate:{artery:45},insight:'巴菲特說「別人恐懼時我貪婪」。但你要確定你有足夠的現金撐到恐懼結束。',diary:'「所有人都在收縮。我在擴張。要嘛是天才，要嘛是瘋子。」'},
  {l:'C',t:'全員減薪 20%，共度難關',fx:{hb:-8,cash:50},fs:{n:'共患難',d:3,fx:{hb:10}},insight:'共患難比裁員更能建立長期忠誠。但前提是，難關真的能度過。',diary:'「我先砍自己的薪水。然後才開口要求團隊。」'}]},
// ── 科技業專屬卡 ──
{id:31,title:'程式碼外洩',year:[1,3],industry:'tech',desc:`${npc('zhang')}臉色鐵青走進來：「有人把我們的核心演算法上傳到 GitHub，已經被 fork 了 47 次。」`,npcId:'zhang',
opts:[{l:'A',t:'立即法律追訴',fx:{cash:-80,roots:-3},fs:{n:'法律結果',d:3,fx:{roots:5}},insight:'智慧財產是科技公司的核心資產。保護它的成本永遠比失去它的成本低。'},{l:'B',t:'開源核心，轉攻服務',fx:{hb:5,roots:-8},fs:{n:'開源效應',d:4,fx:{roots:10,hb:3}},insight:'有時候把城牆拆了，反而讓更多人進來——只要你經營的是城裡的生意。'}]},
{id:32,title:'AI 取代爭議',year:[2,4],industry:'tech',desc:`${npc('lin')}在週會上提議：「用 AI 取代客服團隊，省 40% 人力成本。但${npc('chen')}擔心裁掉的人會去競爭對手。」`,npcId:'lin',
opts:[{l:'A',t:'全面導入 AI 客服',fx:{hb:-10,roots:-3},sp:'cutExp',insight:'自動化提升效率，但客戶分得出機器和人。關鍵問題不是「能不能用 AI」，而是「客戶在乎不在乎」。'},{l:'B',t:'AI 輔助，人力不裁',fx:{cash:-40,hb:4},insight:'最好的 AI 策略不是取代人，是讓人做只有人能做的事。'},{l:'C',t:'暫不導入，先觀望',fx:{},insight:'不做決定也是一種決定——只是你把主導權交給了時間。'}]},
{id:33,title:'技術人才爭奪戰',year:[3,5],industry:'tech',desc:'三個資深工程師同時收到大廠 offer，開價是你的 2 倍。留不住就等於砍掉半個研發部門。',
opts:[{l:'A',t:'股權激勵綁 3 年',fx:{cash:-30,hb:8},fs:{n:'股權留人',d:4,fx:{hb:5}},insight:'股權綁的不只是人，是讓他們覺得「這也是我的公司」。'},{l:'B',t:'加薪 50% 留人',fx:{cash:-120,hb:3},insight:'加薪留人就像止痛藥——管用，但不治本。下次對手出更高價呢？'}]},
{id:34,title:'產品方向分歧',year:[2,4],industry:'tech',desc:`${npc('zhang')}要做 B2B 企業版，${npc('lin')}堅持 B2C 消費者市場。兩邊都有道理，但資源只夠做一個。`,npcId:'zhang',
opts:[{l:'A',t:'B2B 企業版',fx:{cash:-60,roots:-5,hb:3},fs:{n:'B2B 回報',d:5,fx:{roots:12,cash:60}},insight:'B2B 客單價高、留存率高，但銷售週期長。適合有耐心的團隊。'},{l:'B',t:'B2C 消費市場',fx:{cash:-40,roots:5,hb:-3},fs:{n:'B2C 回報',d:4,fx:{roots:8},rnd:{fail:{roots:-6},ch:40}},insight:'B2C 量大但忠誠度低。今天的爆款可能是明天的棄用。'}]},
// ── 餐飲業專屬卡 ──
{id:35,title:'食安危機',year:[1,3],industry:'food',desc:'衛生局抽檢，一家分店的大腸桿菌超標。新聞已經在跑了。',
opts:[{l:'A',t:'主動召回 + 全額退款',fx:{cash:-100,roots:-8,hb:3},fs:{n:'危機反轉',d:3,fx:{roots:10}},insight:'食安危機的黃金 72 小時：主動比被動好，透明比掩蓋好。'},{l:'B',t:'低調處理，只關那家店',fx:{cash:-30,roots:-3},fs:{n:'信任崩塌',d:4,fx:{roots:-15}},insight:'在食品業，信任是唯一的護城河。一次低調處理可能需要五年重建。'}]},
{id:36,title:'外送平台抽成漲價',year:[2,4],industry:'food',desc:`${npc('chen')}算了一筆帳：「外送平台抽成從 25% 漲到 35%，我們的外送毛利剩不到 5%。」`,npcId:'chen',
opts:[{l:'A',t:'自建外送團隊',fx:{cash:-80,hb:-3},fs:{n:'自建外送',d:4,fx:{cash:30,roots:5}},insight:'掌握通路就掌握命運。但自建的前期成本是許多小餐飲撐不過的。'},{l:'B',t:'接受漲價，專注堂食',fx:{roots:-5},insight:'放棄一個通路不是失敗，是聚焦。但你得確定堂食撐得起整間店。'}]},
{id:37,title:'網紅合作邀約',year:[2,5],industry:'food',desc:'百萬粉絲的美食網紅想合作，要求免費用餐 + $30 萬合作費。團隊意見分歧。',
opts:[{l:'A',t:'合作',fx:{cash:-30,roots:8,hb:-2},insight:'網紅行銷是槓桿——用得好一夜爆紅，用不好錢花了沒聲量。'},{l:'B',t:'婉拒，靠口碑自然成長',fx:{roots:2},insight:'口碑慢但扎實。每一個自然推薦的客人，留存率是廣告來客的 3 倍。'}]},
{id:38,title:'展店 vs 深耕',year:[3,5],industry:'food',desc:`${npc('lin')}拿著商圈分析報告：「黃金地段的店面要被搶走了，月租 $15 萬，現在不簽就沒了。」`,npcId:'lin',
opts:[{l:'A',t:'搶下黃金店面',fx:{cash:-60,roots:3},fs:{n:'新店效應',d:3,fx:{roots:6,cash:-20}},gate:{artery:45},insight:'展店的時機比位置重要。資金緊的時候展店，是用整間公司在賭一個店面。'},{l:'B',t:'專注現有店的體驗升級',fx:{cash:-30,hb:4,roots:2},insight:'把一家店做到客人排隊，比開三家平庸的店更有價值。'}]},
// ── 製造業專屬卡 ──
{id:39,title:'產線自動化投資',year:[1,3],industry:'mfg',desc:`${npc('zhang')}提案：「$200 萬全面自動化，人力砍半，產能翻倍。但導入期 6 個月產能歸零。」`,npcId:'zhang',
opts:[{l:'A',t:'全面自動化',fx:{cash:-200,hb:-8,roots:-5},fs:{n:'自動化完成',d:4,fx:{hb:6,roots:10}},sp:'cutExp',gate:{artery:50},insight:'自動化是不可逆的一次性決策。做對了翻身，做錯了你沒有第二次機會。'},{l:'B',t:'半自動化（關鍵工站）',fx:{cash:-80,hb:-3},fs:{n:'半自動效益',d:3,fx:{hb:3,roots:3}},insight:'半自動化保留了人的彈性。在需求變動大的行業，彈性比效率更有價值。'}]},
{id:40,title:'大單 vs 品質',year:[2,4],industry:'mfg',desc:'接到一筆 $300 萬的急單，交期只有一半。趕得出來但品質一定打折。',
opts:[{l:'A',t:'接單趕工',fx:{cash:300,hb:-6,roots:-4},fs:{n:'品質問題',d:3,fx:{roots:-10,cash:-80}},insight:'急單的利潤是用品質風險換來的。每一個瑕疵品都在消耗你花了三年建立的聲譽。'},{l:'B',t:'婉拒，守住品質底線',fx:{roots:5,hb:3},insight:'拒絕不合理的訂單是一種能力。客戶會因為你的堅持而更信任你。'}]},
{id:41,title:'環保法規升級',year:[3,5],industry:'mfg',desc:`${npc('wang')}帶來消息：「新版環保法規明年上路，你的排放設備要全面升級，否則面臨停工。」`,npcId:'wang',
opts:[{l:'A',t:'立即升級設備',fx:{cash:-150,hb:2},fs:{n:'合規優勢',d:3,fx:{roots:8}},insight:'法規合規不是成本，是門票。提早做的人拿到的是競爭優勢，晚做的人付的是罰款。'},{l:'B',t:'拖到最後期限再說',fx:{},fs:{n:'罰款風險',d:5,fx:{cash:-100,roots:-8}},insight:'拖延不會讓問題消失。它只是讓問題帶著利息回來。'}]},
{id:42,title:'供應鏈國產化',year:[2,4],industry:'mfg',desc:'進口原料佔成本 60%。國產替代品便宜 40%，但品質還要磨合。',
opts:[{l:'A',t:'全面轉國產',fx:{hb:-3,roots:-4},fs:{n:'國產磨合',d:4,fx:{cash:60,roots:3}},insight:'供應鏈在地化降低了匯率風險和運輸風險，但品質磨合期是最危險的時候。'},{l:'B',t:'雙軌並行',fx:{cash:-40},fs:{n:'雙軌穩定',d:3,fx:{roots:3}},insight:'雙供應商策略成本高但安全。問題是你有沒有那個管理能力同時經營兩條線。'}]},
// ── 醫療業專屬卡 ──
{id:43,title:'醫療糾紛',year:[1,3],industry:'med',desc:'病患家屬控告醫療疏失，媒體聞風趕到。律師說和解要 $120 萬，打官司要 $60 萬但風險高。',
opts:[{l:'A',t:'和解',fx:{cash:-120,roots:-3,hb:3},insight:'醫療業的和解不是認輸，是止血。官司拖越久，媒體寫越多，傷害越大。'},{l:'B',t:'打官司',fx:{cash:-60,hb:-5},fs:{n:'官司結果',d:5,fx:{cash:-80,roots:-8},rnd:{fail:{roots:-12},ch:40}},insight:'打官司的風險不只是輸——是過程中消耗的時間、精力、和聲譽。'}]},
{id:44,title:'健保給付調降',year:[2,4],industry:'med',desc:`${npc('chen')}：「健保局公告給付調降 15%。自費項目的佔比必須從 30% 提高到 50%，否則虧損。」`,npcId:'chen',
opts:[{l:'A',t:'積極轉型自費',fx:{cash:-50,roots:-6,hb:2},fs:{n:'自費轉型',d:4,fx:{roots:8,cash:40}},insight:'醫療業的自費轉型是趨勢，但轉太快會流失健保病患——而他們是穩定收入的基石。'},{l:'B',t:'維持健保為主，降成本因應',fx:{hb:-4},sp:'cutExp',insight:'降成本在醫療業有道德底線。省到影響品質的那一刻，你省掉的不只是錢。'}]},
{id:45,title:'名醫跳槽',year:[3,5],industry:'med',desc:'你的招牌醫師被對面的連鎖診所挖走了。他帶走了 35% 的自費病患。',
opts:[{l:'A',t:'高薪反挖 + 競業條款',fx:{cash:-100,hb:3,roots:5},insight:'留住名醫的最好方法不是錢——是讓他覺得「離開這裡我做不到這些事」。'},{l:'B',t:'不留，培養自有品牌',fx:{hb:5,roots:-10},fs:{n:'品牌重建',d:5,fx:{roots:12}},insight:'依賴個人品牌的診所永遠脆弱。建立機構品牌才能不怕任何一個人離開。'}]},
{id:46,title:'遠距醫療法規鬆綁',year:[2,5],industry:'med',desc:`${npc('zhang')}：「法規鬆綁了，遠距醫療合法化。但建置系統要 $80 萬，而且團隊完全沒經驗。」`,npcId:'zhang',
opts:[{l:'A',t:'率先投入遠距醫療',fx:{cash:-80,hb:-3,roots:3},fs:{n:'遠距先行者',d:4,fx:{roots:10,cash:30}},insight:'法規鬆綁後的窗口期很短。先行者拿到的是品牌認知，跟隨者拿到的只是功能。'},{l:'B',t:'等其他人試錯再跟進',fx:{roots:-2},insight:'後進者的優勢是學費便宜。但在醫療業，先行者的信任優勢很難追上。'}]}
];

// ═══════ GAME LOOP ═══════
let usedD=[],phases=[];

function startGame(mode){
  G.companyName=document.getElementById('company-name').value.trim()||'我的公司';
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  G.mode=mode;G.industry=_selectedIndustry;
  G.maxSeasons=mode==='challenge'?24:20;
  // Apply industry config
  const ind=INDUSTRY[G.industry];
  G.cash=ind.cash;G.hb=ind.hb;G.roots=ind.roots;G.revenue=ind.revenue;G.expense=ind.expense;G.decayHb=ind.decayHb;G.decayRoots=ind.decayRoots;
  if(mode==='challenge'){G.hb=Math.max(40,G.hb-15);G.roots=Math.max(30,G.roots-15);G.cash=Math.round(G.cash*0.7);G.decayHb+=1;G.decayRoots+=1;}
  // Load legacy traits
  const saved=localStorage.getItem('entropy_traits');
  if(saved){try{G.traits=JSON.parse(saved);applyTraits();}catch(e){}}
  // AI
  G.ai=AI_TYPES[Math.floor(Math.random()*3)];
  G.aiPhase={phase:1};
  if(mode==='challenge'){G.ai2=AI_TYPES.filter(t=>t!==G.ai)[Math.floor(Math.random()*2)];G.ai2Phase={phase:1};}
  G.season=0;G.npcAdvice={};
  runSeason();
}

function applyTraits(){
  G.traits.forEach(t=>{
    if(t==='orgMemory')G.hb=Math.min(100,G.hb+5);
    if(t==='reputation')G.roots=Math.min(100,G.roots+7);
  });
}

function runSeason(){
  if(!G.alive||G.season>=G.maxSeasons){endGame();return;}
  updateSB();
  // Record history snapshot
  G.history.push({s:G.season,cash:Math.round(G.cash),hb:G.hb,roots:G.roots,art:Math.round(artery()),nw:calcNW()});
  // Season mood (rhythm variation)
  rollSeasonMood();
  // Expense triggers inline in invest phase now
  if(G.season>0)tryExpense();
  phases=[];
  phases.push('invest');
  if(isDec()){
    if(G.seasonMood!=='calm') phases.push('entropy');
    if(G.mode==='challenge'&&G.seasonMood!=='calm') phases.push('entropy2');
    if(G.seasonMood==='storm') phases.push('entropy'); // double entropy in storm
    if(shouldTriggerAIEvent()) phases.push('aiEvent');
    phases.push('decision');
  } else {
    phases.push('execution');
    if(G.seasonMood==='storm'&&Math.random()<0.4){ phases.push('entropy'); } // storm: 40% chance entropy in ops
    if(rollOpp()) phases.push('opportunity');
    if(G.seasonMood==='calm'&&Math.random()<0.5) phases.push('opportunity'); // calm = extra chance of good news
  }
  phases.push('settle');
  phases.push('postSettle');
  nextPhase();
}

function nextPhase(){
  if(!G.alive){endGame();return;}
  if(!phases.length){G.season++;runSeason();return;}
  const p=phases.shift();
  const map={invest:showInvest,entropy:showEntropy,entropy2:showEntropy,decision:showDec,execution:showExec,settle:doSettle,aiEvent:showAIEvent,market:showMarket,deal:showDeal,opportunity:showOpp,postSettle:showPostSettle};
  (map[p]||nextPhase)();
}

// ═══════ AI SYSTEM ═══════
function getAIEffects(aiType,aiPhase){
  const y=yr();const fx={hb:0,roots:0,cash:0,rootsDecay:0,hbDecay:0,revMult:0};
  if(aiType==='猛虎'){
    if(y<=2){fx.rootsDecay=1;fx.revMult=-0.05;}
    else if(y<=3){if(!aiPhase.resolved){aiPhase.resolved=true;aiPhase.crashed=Math.random()<0.4;}
      if(aiPhase.crashed){fx.rootsDecay=-3;fx.hbDecay=-1;}else{fx.rootsDecay=2;fx.revMult=-0.10;}}
    else{if(aiPhase.crashed){fx.rootsDecay=-2;}else{fx.rootsDecay=2;fx.revMult=-0.10;}}
  }else if(aiType==='老狐'){
    if(y<=3){if(G.season%3===0)fx.roots=-2;}
    else{if(artery()<40){fx.rootsDecay=4;}else{fx.roots=-1;}}
  }else if(aiType==='狼群'){
    if(y<=2){fx.hbDecay=1;}
    else if(y<=4){if(G.hb>75)fx.hbDecay=0;else fx.hbDecay=2;}
    else{if(!aiPhase.resolved5){aiPhase.resolved5=true;aiPhase.crashed5=Math.random()<0.5;}
      if(aiPhase.crashed5)fx.hb=5;else fx.hbDecay=2;}
  }
  return fx;
}

function shouldTriggerAIEvent(){return Math.random()<0.15&&yr()>=3;}

function showAIEvent(){
  const avail=AI_DC.filter(c=>yr()>=c.year[0]&&yr()<=c.year[1]);
  if(!avail.length){nextPhase();return;}
  const card=avail[Math.floor(Math.random()*avail.length)];
  renderCard(card,'ai');
}

    // Cost indicator class
    let costCls='';
    if(o.fx?.cash<-50)costCls='opt-cost-neg';
    else if(o.fx?.cash>0)costCls='opt-cost-pos';
    if(o.fs)costCls+=' opt-risk';

function skipLockedDec(cid){
  usedD.push(cid);
  G.hb-=3;G.roots-=2;
  G.decisions.push({season:G.season,label:sL(),title:window._curCard?.title||'',chosen:'跳過',chosenText:'無力處理，被迫跳過',chosenFx:{hb:-3,roots:-2},allOpts:[],hasForeshadow:false,fsName:''});
  clamp();updateSB();nextPhase();
}

function pickDec(cid,oi){
  usedD.push(cid);
  const card=window._curCard||DC.find(c=>c.id===cid)||HIDDEN_DC.find(c=>c.id===cid)||AI_DC.find(c=>c.id===cid);
  const opt=card.opts[oi];
  // Record decision for review
  G.decisions.push({season:G.season,label:sL(),title:card.title,chosen:opt.l,chosenText:opt.t,chosenFx:{...opt.fx},
    allOpts:card.opts.map(o=>({l:o.l,t:o.t,fx:{...o.fx}})),hasForeshadow:!!opt.fs,fsName:opt.fs?.n||''});
  aFx(opt.fx);
  if(opt.sp==='cutExp')G.expDelta-=35;
  if(opt.sp==='cutRev')G.revDelta-=25;
  if(opt.sp==='restruct')G.expDelta-=30;
  if(opt.sp==='ipo')G.expDelta+=60;
  if(opt.permExp)G.expDelta+=opt.permExp;
  if(opt.sp==='sellout'){G.alive=true;G.season=G.maxSeasons-1;endGame();return;}
  // Cascade: modify parent foreshadow if modFs exists
  if(opt.modFs&&window._cascadeCtx){
    const parentFs=G.foreshadows.find(f=>f.parentId===window._cascadeCtx.parentId);
    if(parentFs){parentFs.fx={...opt.modFs};}
    window._cascadeCtx=null;
  }
  if(opt.fs){
    G.foreshadows.push({n:opt.fs.n,trigger:G.season+opt.fs.d,fx:{...opt.fs.fx},rnd:opt.fs.rnd,cond:opt.fs.cond,
      src:`${sL()} 「${card.title}」選了 ${opt.l}：${opt.t}`,parentId:cid,parentOpt:opt.l});
  }
  // Cascade: queue sub-card for next decision season
  if(CASCADE[cid]){
    const branch=opt.l.startsWith('A')?'A':'B';
    if(CASCADE[cid][branch])G._pendingCascade={parentId:cid,branch,parentFsIdx:G.foreshadows.length-1};
  }
  // Track NPC advice
  if(card.npcId)trackNpc(card.npcId);
  clamp();updateSB();

  // CEO diary + insight — brief pause then continue
  const el=document.getElementById('content');
  let extra='';
  if(opt.diary) extra+=`<div class="ceo-diary">${opt.diary}</div>`;
  if(opt.insight) extra+=`<div class="ceo-diary" style="border-left-color:var(--accent);margin-top:6px">💡 ${opt.insight}</div>`;
  if(extra){
    el.innerHTML+=extra;
    setTimeout(()=>nextPhase(),opt.insight?2500:1500);
  } else { nextPhase(); }
}

function cInv(){(window._sel||[]).forEach(i=>{const o=window._inv[i];G.cash-=o.cost;aFx(o.fx);if(o.sus)G.investEffects.push({...o.sus,r:o.sus.s});if(o.permExp)G.expDelta+=o.permExp;if(o.permRev)G.revDelta+=o.permRev;
  G.decisions.push({season:G.season,label:sL(),title:'投資：'+o.name,chosen:'—',chosenText:o.name,chosenFx:{cash:-o.cost,...o.fx},allOpts:[],hasForeshadow:false,fsName:''});
});clamp();updateSB();nextPhase();}
function getAvailProj(){if(G.activeProject)return[];return PROJ.filter(p=>yr()>=p.minY&&!G.completedProjects.includes(p.id)&&getM(p.gt)>p.gv).slice(0,2);}

function prT(p){const r=p.rw;const s=[];if(r.roots)s.push(`根系+${r.roots}`);if(r.hb)s.push(`心跳+${r.hb}`);if(r.revDelta)s.push(`收入+$${r.revDelta}萬`);if(r.expDelta)s.push(`支出${r.expDelta}萬`);if(r.cash)s.push(`+$${r.cash}萬`);if(r.hbFloor)s.push(`心跳地板${r.hbFloor}`);return s.join('，');}
function startProj(pid){const p=PROJ.find(x=>x.id===pid);if(!p)return;const tc=G.traits.includes('stratEye')?p.cost-20:p.cost;G.activeProject={...p,progress:0,stalled:0,boosted:false,sc:0};G.cash-=tc;window._mx=Math.max(0,(window._mx||1)-1);clamp();updateSB();showInvest();}

// ═══════ SETTLEMENT ═══════
function doSettle(){
  const b={cash:G.cash,hb:G.hb,roots:G.roots,art:artery()};const log=[];

  // Income
  let net=eR()-eE()-(G.activeProject?G.activeProject.mnt:0);
  // AI revenue modifier
  const aiFx=getAIEffects(G.ai,G.aiPhase);
  if(aiFx.revMult)net+=Math.round(eR()*aiFx.revMult);
  G.cash+=net;log.push({l:'營運淨額',v:`${net>=0?'+':''}$${net}萬`});

  // Step 1.5: Asset passive income
  if(G.assets.length){
    let totalCf=0;
    G.assets.forEach(a=>{totalCf+=a.cf;});
    if(totalCf>0){G.cash+=totalCf;log.push({l:'🏪 被動收入',v:`+$${totalCf}萬（${G.assets.length} 項資產）`});}
  }

  // Step 1.7: Market price fluctuation
  STOCKS.forEach(s=>{
    let change=0;
    const range=s.vol==='high'?{min:-0.20,max:0.25}:{min:-0.08,max:0.12};
    change=range.min+Math.random()*(range.max-range.min);
    if(G.roots>60)change+=0.05;if(G.roots<30)change-=0.10;
    if(G.hb>70&&s.id==='deal-x1')change+=0.08;
    const old=G.marketPrices[s.id];
    G.marketPrices[s.id]=Math.max(5,Math.min(500,Math.floor(old*(1+change))));
  });

  // AI lifeline effects
  if(aiFx.roots)G.roots+=aiFx.roots;
  if(aiFx.hb)G.hb+=aiFx.hb;
  const aiDecayR=aiFx.rootsDecay||0;const aiDecayH=aiFx.hbDecay||0;
  if(G.ai2){const a2=getAIEffects(G.ai2,G.ai2Phase);if(a2.roots)G.roots+=a2.roots;if(a2.hb)G.hb+=a2.hb;}

  // Sustained invest
  G.investEffects.forEach(e=>{if(e.r>0){if(e.hb){G.hb+=e.hb;log.push({l:'培訓',v:`心跳+${e.hb}`});}if(e.roots){G.roots+=e.roots;log.push({l:'深耕',v:`根系+${e.roots}`});}e.r--;}});
  G.investEffects=G.investEffects.filter(e=>e.r>0);

  // Project
  if(G.activeProject){const p=G.activeProject;p.progress++;
    if(p.progress===2||p.progress===4){const v=getM(p.gt);

      else{p.sc=(p.sc||0)+1;if(p.sc>=2){G.hb-=5;G.activeProject=null;G.projectCooldown=2;log.push({l:`❌ ${p.name}放棄`,v:'心跳-5'});}else{p.stalled=1;log.push({l:`⚠️ ${p.name}停滯`,v:`${mL(p.gt)}<${p.mg}`});}}}

  // Growth mode check

  // End cleanup

  }else if(totalD>-5){mood='➡️ 平穩度過';moodClass='mood-good';ceoMood='沒有大起大落——但不行動也是一種決策。';

    if(yy===3&&G.completedProjects.length>0){milestone='🏗️ 第三年完成了戰略計畫！公司有了護城河。';G.milestones.push('Y3計畫完成');}
    if(yy===4&&G.hb>60&&G.roots>60){milestone='⭐ 第四年三條命脈都在健康區——你是少數做到這一點的 CEO。';G.milestones.push('Y4全線健康');}

  let h=`<div class="phase-title">📊 ${G.companyName} — 董事會報告 ${sL()}${G.growthMode?'<span class="growth-badge" style="margin-left:8px">📈 成長模式</span>':''}</div><div class="card">

  let rowIdx=0;
  [{l:'現金動脈',b:b.art,a:a.art,u:'%'},{l:'組織心跳',b:b.hb,a:a.hb,u:''},{l:'客戶根系',b:b.roots,a:a.roots,u:''},{l:'可用現金',b:b.cash,a:a.cash,u:'萬'}].forEach(m=>{

  h+=`<div style="font-size:12px;font-weight:700;margin:16px 0 8px;color:var(--accent)">💡 本局洞察</div>`;
  const insights=[];
  if(G.decisions.some(d=>d.title==='明星員工求去'))insights.push({t:'留人 vs 建梯隊',l:'個別加薪解決眼前，虛擬股權綁定未來，放手建梯隊則打造不依賴個人的組織。最佳答案取決於你在哪個階段。'});
  if(G.decisions.some(d=>d.title==='股權激勵要求'))insights.push({t:'股權不是獎勵過去',l:'實股容易把奮鬥者變成食利者。動態股權保持了激勵與貢獻的掛鉤。口頭承諾是最貴的選項——拖延不是決策，是最差的決策。'});
  if(G.decisions.some(d=>d.title==='年度目標拉鋸'))insights.push({t:'目標不是用來完成的',l:'降目標看似善待團隊，但目標是用來激發增量的工具。降了就回不去——團隊養成「目標可以談判」的習慣。'});
  if(G.decisions.some(d=>d.title==='跨界競爭者進入'))insights.push({t:'面對低價競爭',l:'降價是最差的策略——你永遠比不上燒錢的人便宜。深耕壁壘短期痛但長期贏。聯盟的前提是你有不可替代的價值。'});
  if(G.decisions.some(d=>d.title==='數據安全事件'))insights.push({t:'危機處理的差異',l:'全面透明看起來最貴，但信任反彈的回報遠超成本。低調處理是假省錢——延遲後果的懲罰是即時支出的數倍。合規是底線，不是策略。'});
  if(G.decisions.some(d=>d.title==='內部創業提案'))insights.push({t:'半投入比不投入更浪費',l:'給一半資源做不出結果，又花了錢。要嘛全押要嘛不做——折衷是創業者最常犯的錯。'});
  if(G.decisions.some(d=>d.title==='景氣崩潰'))insights.push({t:'危機中的選擇',l:'裁員立刻改善數字但破壞組織和客戶。逆勢綁團隊短期現金壓力巨大，但留下的團隊在景氣回暖時領先對手。危機暴露真正的經營哲學。'});
  if(G.hb<35||G.roots<25)insights.push({t:'死亡螺旋的教訓',l:'正向飛輪增益慢（+2），死亡螺旋損耗快（-4、-5）。建立信任三年，摧毀信任三天。一旦進入螺旋，恢復成本是預防成本的數倍。'});
  if(G.assets.length>=3)insights.push({t:'被動收入的力量',l:'資產組合能建立第二收入引擎。但買資產立刻壓低動脈——時機比數量重要。在動脈健康時佈局，在危機時靠被動收入撐過去。'});
  if(!insights.length)insights.push({t:'持續經營',l:'每個決策都有代價。好的 CEO 不是做出完美決策，而是在不完美的選擇中找到最能存活的路。'});
  insights.forEach(ins=>{
    h+=`<div class="knowledge-box"><div class="kb-title">${ins.t}</div><div class="kb-lesson">${ins.l}</div></div>`;
  });

  h+=`</div>`; // end review-section

  // Legacy
  if(maxPick>0&&avail.length>0){
    h+=`<div class="card" style="text-align:left;margin-top:16px"><div class="card-title">🧬 傳承特質（選 ${maxPick} 個帶入下局）</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:10px">你的經營軌跡解鎖了以下特質</div>`;
    avail.forEach(t=>{
      h+=`<button class="trait-btn" data-tid="${t.id}" onclick="pickTrait(this,'${t.id}')">
        <div class="trait-name">${t.name}</div><div class="trait-fx">${t.desc}：${t.fx}</div></button>`;
    });
    h+=`<button class="btn-primary" onclick="saveLegacy(${maxPick})">確認傳承</button></div>`;
  }
  h+=`<button class="btn-primary" style="margin-top:12px" onclick="location.reload()">再來一局</button></div>`;
  document.getElementById('content').innerHTML=h;
  // Scroll to top
  document.getElementById('main').scrollTop=0;
  window._legacyMax=maxPick;window._legacySel=[];
}

function calcScore(){
  if(!G.alive)return 0;
  return Math.round(artery()*1.5+G.hb*1.5+G.roots*1.5+50+G.completedProjects.length*30+Math.min(30,calcNW()/20)+(G.growthMode?50:0));
}
function calcGrade(){
  if(!G.alive)return G.season>=18?'D':'F';
  const s=calcScore();
  return s>=400?'S':s>=300?'A':s>=200?'B':s>=100?'C':'D';
}

function pickTrait(el,tid){
  const s=window._legacySel;const i=s.indexOf(tid);
  if(i>=0){s.splice(i,1);el.classList.remove('selected');}
  else if(s.length<window._legacyMax){s.push(tid);el.classList.add('selected');}
}

function saveLegacy(max){
  const sel=window._legacySel;if(sel.length>max)return;
  localStorage.setItem('entropy_traits',JSON.stringify(sel));
  location.reload();
}

// ═══════ SIDEBAR ═══════
function updateSB(){
  const a=artery();
  document.getElementById('sb-logo').textContent=G.companyName||'逆熵';
  document.getElementById('sb-season').textContent=sL();
  const pct=Math.round((G.season/G.maxSeasons)*100);
  document.getElementById('sb-progress').style.width=pct+'%';
  document.getElementById('sb-progress-pct').textContent=pct+'%';
  document.getElementById('sb-cash').textContent=`$${Math.round(G.cash)} 萬`;
  document.getElementById('sb-apct').textContent=Math.round(a)+'%';
  document.getElementById('sb-rev').textContent=`$${eR()}萬`;
  document.getElementById('sb-exp').textContent=`$${eE()}萬`;
  document.getElementById('sb-av').textContent=Math.round(a)+'%';
  const ab=document.getElementById('sb-ab');ab.style.width=a+'%';ab.style.background=zc(a);
  document.getElementById('sb-hv').textContent=G.hb;
  const hb=document.getElementById('sb-hb');hb.style.width=G.hb+'%';hb.style.background=zc(G.hb);
  document.getElementById('sb-hz').textContent=`${ze(G.hb)} ${hd(G.hb)}`;
  document.getElementById('sb-rv').textContent=G.roots;
  const rb=document.getElementById('sb-rb');rb.style.width=G.roots+'%';rb.style.background=zc(G.roots);
  document.getElementById('sb-rz').textContent=`${ze(G.roots)} ${rd(G.roots)}`;

  // Threshold warnings
  let warnHtml='';
  if(!G.growthMode&&G.assets.length>0){
    const pct=growthPct();
    if(pct>=15&&pct<30) warnHtml+=`<div class="threshold-warn threshold-near-growth">📈 被動收入 ${pct}%／支出 — 再 ${30-pct}% 解鎖成長模式！</div>`;
  }
  if(G.growthMode){warnHtml+=`<div class="threshold-warn threshold-near-growth" style="animation:none;opacity:.8">🚀 成長模式 · 被動收入 ${growthPct()}%</div>`;}
  if(a>=25&&a<35) warnHtml+=`<div class="threshold-warn threshold-near-spiral">⚠️ 動脈 ${Math.round(a)}% — 接近螺旋觸發</div>`;
  if(G.hb>=30&&G.hb<40) warnHtml+=`<div class="threshold-warn threshold-near-spiral">⚠️ 心跳 ${G.hb} — 接近螺旋觸發</div>`;
  document.getElementById('sb-warnings').innerHTML=warnHtml;

  // Market — AI personality
  let mk='';
  [G.ai,G.ai2].forEach(ai=>{
    if(!ai)return;
    const p=AI_PROFILE[ai];
    const fx=getAIEffects(ai,ai===G.ai?G.aiPhase:G.ai2Phase);
    const intensity=Math.abs(fx.rootsDecay||0)+Math.abs(fx.hbDecay||0)+Math.abs(fx.revMult||0)*10;
    const level=intensity>=3?'高':intensity>=1?'中':'低';
    const y=yr();
    const ph=ai===G.ai?G.aiPhase:G.ai2Phase;
    let intel=p.intel[y]||p.intel[5]||'';
    if(ph.crashed&&y>=3)intel=p.intel.crash||intel;
    if(ph.crashed5)intel=p.intel.crash||intel;
    if(ph.resolved&&!ph.crashed&&y>=4)intel=p.intel.survive||intel;
    mk+=`<div class="sb-market"><div class="mk-name">${p.icon} ${p.name}</div>
      <div class="mk-detail">${p.desc}　壓力：${level}</div>
      <div style="font-size:9px;color:var(--dim);margin-top:3px;font-style:italic">${intel}</div></div>`;
  });
  document.getElementById('sb-mkt').innerHTML=mk;

  // Status
  let sh='';
  if(G.foreshadows.length)sh+=`<div class="sb-fs"><span class="fs-dot"></span>${G.foreshadows.length} 伏筆潛伏</div>`;
  if(G.activeProject){const p=G.activeProject;sh+=`<div class="sb-proj"><div class="pn">🔶 ${p.name}</div><div class="pd">進度 ${p.progress}/4${p.stalled?' ⚠️':''}${p.boosted?' ⏫':''}</div></div>`;}
  G.completedProjects.forEach(pid=>{const p=PROJ.find(x=>x.id===pid);if(p)sh+=`<div class="sb-proj" style="border-color:var(--green);opacity:.6"><div class="pn">✅ ${p.name}</div></div>`;});
  // Assets
  if(G.assets.length){
    const totalCf=G.assets.reduce((s,a)=>s+a.cf,0);
    sh+=`<div style="font-size:10px;color:var(--green);padding:4px 0;margin-top:4px">📦 資產 ${G.assets.length} 項　+$${totalCf}萬/季</div>`;
    G.assets.forEach(a=>sh+=`<div style="font-size:9px;color:var(--dim);padding:1px 0;padding-left:12px">🏪 ${a.name} +$${a.cf}萬</div>`);
  }
  // Stocks
  if(G.stocks.length){
    const totalVal=G.stocks.reduce((s,st)=>s+G.marketPrices[st.dealCardId],0);
    sh+=`<div style="font-size:10px;color:var(--blue);padding:4px 0;margin-top:4px">📈 持股 ${G.stocks.length} 股　市值 $${totalVal}萬</div>`;
  }
  // Net worth button — rendered in finance section
  const nw=calcNW();
  document.getElementById('sb-nw-wrap').innerHTML=`<button class="nw-btn" onclick="showDashboard()">
    <div><div class="nw-label">💎 淨資產</div><div class="nw-val">$${nw}萬</div></div>
    <span class="nw-arrow">📊 詳情 →</span></button>`;
  if(G.traits.length)G.traits.forEach(tid=>{const t=TRAITS.find(x=>x.id===tid);if(t)sh+=`<div style="font-size:10px;color:var(--purple);padding:2px 0">🧬 ${t.name}</div>`;});
  document.getElementById('sb-status').innerHTML=sh||'<div style="font-size:11px;color:var(--dim)">—</div>';
}

// ═══════ DASHBOARD MODAL ═══════
function showDashboard(){
  const hist=G.history;
  if(!hist.length)return;

  // SVG chart
  const w=520,h=160,pad=30;
  const maxS=hist.length;
  const xStep=(w-pad*2)/(Math.max(1,maxS-1));

  function makeLine(data,key,color){
    const vals=data.map(d=>d[key]);
    const max=Math.max(...vals,1);const min=Math.min(...vals,0);
    const range=max-min||1;
    let path='';
    vals.forEach((v,i)=>{
      const x=pad+i*xStep;
      const y=h-pad-((v-min)/range)*(h-pad*2);
      path+=(i===0?'M':'L')+`${x.toFixed(1)},${y.toFixed(1)} `;
    });
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"/>`;
  }

  // X axis labels
  let xLabels='';
  hist.forEach((d,i)=>{
    if(i%4===0){
      const x=pad+i*xStep;
      xLabels+=`<text x="${x}" y="${h-8}" fill="#64748b" font-size="9" text-anchor="middle">Y${Math.floor(d.s/4)+1}</text>`;
    }
  });

  const svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">
    <rect x="${pad}" y="10" width="${w-pad*2}" height="${h-pad-10}" fill="#0f172a" rx="4"/>
    ${makeLine(hist,'cash','#06b6d4')}
    ${makeLine(hist,'hb','#22c55e')}
    ${makeLine(hist,'roots','#eab308')}
    ${makeLine(hist,'nw','#a855f7')}
    ${xLabels}
    <text x="${w-pad}" y="24" fill="#06b6d4" font-size="9" text-anchor="end">現金</text>
    <text x="${w-pad}" y="36" fill="#22c55e" font-size="9" text-anchor="end">心跳</text>
    <text x="${w-pad}" y="48" fill="#eab308" font-size="9" text-anchor="end">根系</text>
    <text x="${w-pad}" y="60" fill="#a855f7" font-size="9" text-anchor="end">淨資產</text>
  </svg>`;

  // Revenue breakdown
  const passiveInc=G.assets.reduce((s,a)=>s+a.cf,0);
  const stockVal=G.stocks.reduce((s,st)=>s+G.marketPrices[st.dealCardId],0);

  let modal=`<div class="modal-overlay" id="dashboard-modal" onclick="if(event.target===this)closeDash()">
    <div class="modal">
      <div class="modal-title"><span>📊 財務儀表板</span><button class="modal-close" onclick="closeDash()">✕</button></div>

      <div class="chart-wrap">
        <div class="chart-label">歷史趨勢（${hist.length} 季）</div>
        ${svg}
      </div>

      <div class="detail-grid">
        <div class="detail-box"><div class="dl">可用現金</div><div class="dv">$${Math.round(G.cash)}萬</div></div>
        <div class="detail-box"><div class="dl">淨資產</div><div class="dv" style="color:var(--accent)">$${calcNW()}萬</div></div>
        <div class="detail-box"><div class="dl">季營收</div><div class="dv">$${eR()}萬</div></div>
        <div class="detail-box"><div class="dl">季支出</div><div class="dv">$${eE()}萬</div></div>
        <div class="detail-box"><div class="dl">被動收入</div><div class="dv" style="color:var(--green)">${passiveInc?'+$'+passiveInc+'萬/季':'—'}</div></div>
        <div class="detail-box"><div class="dl">季淨額</div><div class="dv">${eR()-eE()+passiveInc>=0?'+':''}$${eR()-eE()+passiveInc}萬</div></div>
      </div>`;

  // Assets
  if(G.assets.length){
    modal+=`<div class="chart-wrap"><div class="chart-label">持有資產（${G.assets.length} 項）</div>`;
    G.assets.forEach(a=>{
      const held=G.season-a.acquiredAt;
      const earned=a.cf*held;
      modal+=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border)">
        <span>🏪 ${a.name}</span><span style="color:var(--dim)">成本$${a.cost}萬　+$${a.cf}萬/季　已賺$${earned}萬</span></div>`;
    });
    modal+=`</div>`;
  }

  // Stocks
  if(G.stocks.length){
    modal+=`<div class="chart-wrap"><div class="chart-label">持股（${G.stocks.length} 股）</div>`;
    G.stocks.forEach(st=>{
      const cur=G.marketPrices[st.dealCardId];
      const pnl=cur-st.purchasePrice;
      const pnlPct=Math.round(pnl/st.purchasePrice*100);
      const pnlCls=pnl>=0?'delta-pos':'delta-neg';
      modal+=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border)">
        <span>📈 ${st.name}</span><span>買$${st.purchasePrice}萬 → $${cur}萬 <span class="${pnlCls}">(${pnl>=0?'+':''}${pnlPct}%)</span></span></div>`;
    });
    modal+=`</div>`;
  }

  // Foreshadows
  if(G.foreshadows.length){
    modal+=`<div class="chart-wrap"><div class="chart-label">潛伏中的伏筆（${G.foreshadows.length} 個）</div>`;
    G.foreshadows.forEach(fs=>{
      const remaining=fs.trigger-G.season;
      modal+=`<div style="font-size:11px;padding:3px 0;color:var(--purple)"><span class="fs-dot"></span> ${fs.n}（約 ${remaining} 季後觸發）</div>`;
    });
    modal+=`</div>`;
  }

  modal+=`</div></div>`;

  // Inject modal
  let el=document.getElementById('dashboard-modal');
  if(el)el.remove();
  document.body.insertAdjacentHTML('beforeend',modal);
}

function closeDash(){
  const el=document.getElementById('dashboard-modal');
  if(el)el.remove();
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mob-overlay').classList.toggle('show');}

// Show legacy on start
// ═══════ CHART TOOLTIP ═══════
function showChartTip(el,idx){
  const d=G.history[idx];if(!d)return;
  const dec=G.decisions.find(dc=>dc.season===d.s);
  const tip=document.getElementById('chart-tooltip');if(!tip)return;
  const s=`Y${Math.floor(d.s/4)+1}Q${d.s%4+1}`;
  let html=`<div style="font-weight:700;color:var(--accent);margin-bottom:4px">${s}</div>`;
  html+=`<div>動脈 ${d.art}% · 心跳 ${d.hb} · 根系 ${d.roots} · $${d.cash}萬</div>`;
  if(dec){
    html+=`<div style="margin-top:4px;color:var(--text)">📋 ${dec.title}</div>`;
    html+=`<div style="color:var(--accent)">→ ${dec.chosen}：${dec.chosenText}</div>`;
    html+=`<div style="color:var(--dim)">效果：${fT(dec.chosenFx)}</div>`;
    if(dec.allOpts.length>1){
      const alt=dec.allOpts.find(o=>o.l!==dec.chosen);
      if(alt) html+=`<div style="margin-top:3px;color:var(--purple);font-size:10px">🔮 如果選 ${alt.l}「${alt.t}」→ ${fT(alt.fx)}</div>`;
    }
  }else{html+=`<div style="color:var(--dim);margin-top:2px">（營運季）</div>`;}
  tip.innerHTML=html;tip.style.display='block';
  const rect=el.getBoundingClientRect();const parent=el.closest('.review-chart').getBoundingClientRect();
  tip.style.left=Math.min(rect.left-parent.left,parent.width-290)+'px';
  tip.style.top=(rect.top-parent.top-tip.offsetHeight-8)+'px';
}
function hideChartTip(){const t=document.getElementById('chart-tooltip');if(t)t.style.display='none';}

(function(){
  const saved=localStorage.getItem('entropy_traits');
  if(saved){try{const t=JSON.parse(saved);if(t.length){
    let h='<div style="margin-bottom:16px;font-size:12px;color:var(--purple)">';
    t.forEach(tid=>{const tr=TRAITS.find(x=>x.id===tid);if(tr)h+=`🧬 ${tr.name}　`;});
    h+='</div>';document.getElementById('legacy-display').innerHTML=h;
  }}catch(e){}}
})();
</script>
